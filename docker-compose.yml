services:
  # =====================================================
  # POSTGRESQL - Data Warehouse
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres_dwh
    environment:
      POSTGRES_DB: mobility_and_meteo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./projet_final/postgresql/setup_database.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - data-pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # MINIO - Data Lake 
  # =====================================================
  minio:
    image: minio/minio:latest
    container_name: minio_datalake
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"      # MinIO API
      - "9001:9001"      # MinIO Console
    volumes:
      - minio_data:/data
    networks:
      - data-pipeline
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # =====================================================
  # AIRFLOW - Orchestration
  # =====================================================
  airflow-db:
    image: postgres:15-alpine
    container_name: airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    networks:
      - data-pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    image: apache/airflow:2.7.3-python3.11
    container_name: airflow_webserver
    user: "0:0"
    depends_on:
      - airflow-db
      - postgres
      - minio
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "false"
      AIRFLOW_CONN_POSTGRES_DWH: postgresql://postgres:postgres@postgres:5432/mobility_and_meteo
      AIRFLOW_CONN_MINIO: s3://minioadmin:minioadmin@minio:9000/data
    ports:
      - "8080:8080"
    volumes:
      - ./projet_final/airflow/home:/opt/airflow
      - ./projet_final/airflow/logs:/opt/airflow/logs
      - ./projet_final:/opt/airflow/dags/projet_final
      - ./projet_final/ingestion:/opt/airflow/dags/projet_final/ingestion
      - ./projet_final/transformation:/opt/airflow/dags/projet_final/transformation
    networks:
      - data-pipeline
    command: >
      bash -c "
      mkdir -p /opt/airflow/logs &&
      chmod -R 777 /opt/airflow/logs &&
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
      airflow webserver -p 8080
      "
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-scheduler:
    image: apache/airflow:2.7.3-python3.11
    container_name: airflow_scheduler
    user: "0:0"
    depends_on:
      - airflow-db
      - airflow-webserver
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_POSTGRES_DWH: postgresql://postgres:postgres@postgres:5432/mobility_and_meteo
    volumes:
      - ./projet_final/airflow/home:/opt/airflow
      - ./projet_final/airflow/logs:/opt/airflow/logs
      - ./projet_final:/opt/airflow/dags/projet_final
      - ./projet_final/ingestion:/opt/airflow/dags/projet_final/ingestion
      - ./projet_final/transformation:/opt/airflow/dags/projet_final/transformation
    networks:
      - data-pipeline
    command: >
      bash -c "
      mkdir -p /opt/airflow/logs &&
      chmod -R 777 /opt/airflow/logs &&
      airflow scheduler
      "

  # =====================================================
  # SPARK - Processing (Master)
  # =====================================================
  spark-master:
    image: bitnamilegacy/spark:3.5.4
    container_name: spark_master
    environment:
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
      SPARK_MODE: master
      SPARK_DRIVER_MEMORY: 2G
      SPARK_EXECUTOR_MEMORY: 2G
    ports:
      - "7077:7077"   # Spark Master Port
      - "8081:8081"   # Spark UI
    volumes:
      - spark_master_data:/bitnami/spark/data
      - ./projet_final:/projet_final
    networks:
      - data-pipeline
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =====================================================
  # SPARK - Processing (Worker)
  # =====================================================
  spark-worker-1:
    image: bitnamilegacy/spark:3.5.4
    container_name: spark_worker_1
    depends_on:
      - spark-master
    environment:
      SPARK_RPC_AUTHENTICATION_ENABLED: "no"
      SPARK_RPC_ENCRYPTION_ENABLED: "no"
      SPARK_SSL_ENABLED: "no"
      SPARK_USER: spark
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_DRIVER_MEMORY: 2G
      SPARK_EXECUTOR_MEMORY: 2G
    ports:
      - "8082:8081"
    volumes:
      - spark_worker_1_data:/bitnami/spark/data
      - ./projet_final:/projet_final
    networks:
      - data-pipeline

  # =====================================================
  # JUPYTER - Interactive Notebook 
  # =====================================================
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: jupyter_notebook
    depends_on:
      - spark-master
      - postgres
      - minio
    environment:
      SPARK_MASTER: spark://spark-master:7077
      GRANT_SUDO: "yes"
    ports:
      - "8888:8888"
    volumes:
      - jupyter_home:/home/jovyan/work
      - ./projet_final:/home/jovyan/work/projet_final
    networks:
      - data-pipeline
    command: start-notebook.sh --NotebookApp.token="" --NotebookApp.password=""

  # =====================================================
  # DBT - Data Transformation (avec dbt-postgres)
  # =====================================================
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: dbt_runner
    depends_on:
      - postgres
    environment:
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_USER: postgres
      DBT_POSTGRES_PASSWORD: postgres
      DBT_POSTGRES_PORT: 5432
      DBT_POSTGRES_DBNAME: mobility_and_meteo
    volumes:
      - ./projet_final/dbt_project:/root/dbt_project
    networks:
      - data-pipeline
    command: bash -c "cd /root/dbt_project && dbt --version"

  # =====================================================
  # PGADMIN - PostgreSQL Admin UI 
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - data-pipeline
    depends_on:
      - postgres

volumes:
  postgres_data:
  minio_data:
  airflow_db:
  spark_master_data:
  spark_worker_1_data:
  spark_worker_2_data:
  jupyter_home:
  pgadmin_data:

networks:
  data-pipeline:
    driver: bridge
