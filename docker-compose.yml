services:
  # =====================================================
  # POSTGRESQL - Data Warehouse
  # =====================================================
  postgres:
    image: postgres:15-alpine
    container_name: postgres_dwh
    environment:
      POSTGRES_DB: mobility_and_meteo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./projet_final/postgresql/setup_database.sql:/docker-entrypoint-initdb.d/01-init.sql
    networks:
      - data-pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # =====================================================
  # AIRFLOW - Orchestration
  # =====================================================
  airflow-db:
    image: postgres:15-alpine
    container_name: airflow_postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    networks:
      - data-pipeline
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: airflow_with_flink:latest
    pull_policy: never
    container_name: airflow_webserver
    depends_on:
      - airflow-db
      - postgres
    environment:
      AIRFLOW_HOME: /opt/airflow/home
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__EXECUTE_TASKS_NEW_PYTHON_INTERPRETER: "true"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__LOAD_DEFAULT_CONNECTIONS: "false"
      AIRFLOW__SCHEDULER__CATCHUP_BY_DEFAULT: "false"
      AIRFLOW_CONN_POSTGRES_DWH: postgresql://postgres:postgres@postgres:5432/mobility_and_meteo
    ports:
      - "8080:8080"
    volumes:
      - ./projet_final/airflow/home:/opt/airflow/home
      - ./projet_final/airflow/logs:/opt/airflow/home/logs
      - ./projet_final:/opt/airflow/dags/projet_final
      - ./projet_final/ingestion:/opt/airflow/dags/projet_final/ingestion
      - ./projet_final/transformation:/opt/airflow/dags/projet_final/transformation
    networks:
      - data-pipeline
    command: >
      bash -c "
      mkdir -p /opt/airflow/home/logs &&
      chmod -R 777 /opt/airflow/home/logs &&
      airflow db init &&
      airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com &&
      airflow webserver -p 8080
      "

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    image: airflow_with_flink:latest
    pull_policy: never
    container_name: airflow_scheduler
    depends_on:
      - airflow-db
    environment:
      AIRFLOW_HOME: /opt/airflow/home
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW_CONN_POSTGRES_DWH: postgresql://postgres:postgres@postgres:5432/mobility_and_meteo
    volumes:
      - ./projet_final/airflow/home:/opt/airflow/home
      - ./projet_final/airflow/logs:/opt/airflow/home/logs
      - ./projet_final:/opt/airflow/dags/projet_final
      - ./projet_final/ingestion:/opt/airflow/dags/projet_final/ingestion
      - ./projet_final/transformation:/opt/airflow/dags/projet_final/transformation
    networks:
      - data-pipeline
    command: >
      bash -c "
      mkdir -p /opt/airflow/home/logs &&
      chmod -R 777 /opt/airflow/home/logs &&
      airflow scheduler
      "

  # =====================================================
  # DBT - Data Transformation (avec dbt-postgres)
  # =====================================================
  dbt:
    image: ghcr.io/dbt-labs/dbt-postgres:1.7.0
    container_name: dbt_runner
    depends_on:
      - postgres
    environment:
      DBT_POSTGRES_HOST: postgres
      DBT_POSTGRES_USER: postgres
      DBT_POSTGRES_PASSWORD: postgres
      DBT_POSTGRES_PORT: 5432
      DBT_POSTGRES_DBNAME: mobility_and_meteo
    volumes:
      - ./projet_final/dbt_project:/root/dbt_project
    networks:
      - data-pipeline
    command: bash -c "cd /root/dbt_project && dbt --version"

  # =====================================================
  # PGADMIN - PostgreSQL Admin UI 
  # =====================================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - data-pipeline
    depends_on:
      - postgres

volumes:
  postgres_data:
  airflow_db:
  pgadmin_data:

networks:
  data-pipeline:
    driver: bridge
